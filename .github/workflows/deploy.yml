name: CI/CD PayPhone

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar proyecto
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      - name: Build
        run: echo "Build completado correctamente"

      - name: Test
        run: node --check server.js

      - name: Deploy
        run: echo "Despliegue realizado correctamente"